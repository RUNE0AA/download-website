name: MHTML ذخیره صفحه به

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the webpage to download'
        required: true
        type: string
      title:
        description: 'عنوان اصلی فایل خروجی (مثال: bootstrap_docs)'
        required: true
        type: string
      password:
        description: 'رمز عبور برای فایل ZIP'
        required: true
        type: string
      start_from:
        description: 'شروع لینک‌ها از شماره (مثال: 0 یا 16 یا 31)'
        required: false
        type: string
        default: '0'
      end_at:
        description: 'پایان لینک‌ها تا شماره (مثال: 15 یا 30 یا 40) - 0 = نامحدود'
        required: false
        type: string
        default: '0'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyppeteer beautifulsoup4

      - name: Create Python script with range support
        run: |
          cat > save_range_mhtml.py << 'EOF'
          import asyncio
          import os
          import re
          from pyppeteer import launch
          from bs4 import BeautifulSoup
          import argparse
          from urllib.parse import urljoin, urlparse
          
          async def save_mhtml(page, url, output_path):
              await page.goto(url, waitUntil='networkidle2')
              cdp = await page.target.createCDPSession()
              result = await cdp.send('Page.captureSnapshot', {})
              with open(output_path, 'w', encoding='utf-8') as f:
                  f.write(result['data'])
              return True
          
          async def main():
              parser = argparse.ArgumentParser()
              parser.add_argument('--url', required=True)
              parser.add_argument('--title', required=True)
              parser.add_argument('--start-from', default='0')
              parser.add_argument('--end-at', default='0')
              args = parser.parse_args()
              
              start_idx = int(args.start_from)
              end_idx = int(args.end_at) if args.end_at != '0' else 999999
              
              os.makedirs('downloader', exist_ok=True)
              
              browser = await launch(headless=True, args=['--no-sandbox'])
              page = await browser.newPage()
              
              await page.goto(args.url, waitUntil='networkidle2')
              
              # استخراج لینک‌های داخلی
              content = await page.content()
              soup = BeautifulSoup(content, 'html.parser')
              
              base_domain = urlparse(args.url).netloc
              links = []
              
              for a in soup.find_all('a', href=True):
                  href = a['href']
                  full_url = urljoin(args.url, href)
                  parsed = urlparse(full_url)
                  if parsed.netloc == base_domain and parsed.scheme in ['http', 'https']:
                      if full_url not in links and full_url != args.url:
                          links.append(full_url)
              
              total_links = len(links)
              print(f"🔗 Total internal links found: {total_links}")
              
              # اعمال محدوده
              end_idx = min(end_idx, total_links)
              selected_links = links[start_idx:end_idx]
              
              if not selected_links:
                  print(f"⚠️ No links in range {start_idx} to {end_idx}")
                  await browser.close()
                  return
              
              print(f"📌 Saving links {start_idx} to {end_idx-1} ({len(selected_links)} links)")
              
              # ذخیره صفحه اصلی
              range_str = f"{start_idx}-{end_idx-1}"
              main_file = f"downloader/{args.title}_{range_str}_main.mhtml"
              await save_mhtml(page, args.url, main_file)
              print(f"✅ Main page saved")
              
              # ذخیره صفحات لینک شده
              saved = 1
              for i, link in enumerate(selected_links, start=start_idx+1):
                  link_title = f"{args.title}_link_{i}"
                  link_file = f"downloader/{link_title}.mhtml"
                  try:
                      new_page = await browser.newPage()
                      await save_mhtml(new_page, link, link_file)
                      saved += 1
                      print(f"✅ [{i}/{total_links}] Saved: {link[:80]}...")
                      await new_page.close()
                  except Exception as e:
                      print(f"❌ Failed: {link[:80]}... - {e}")
              
              await browser.close()
              
              print(f"\n🎉 Done! {saved} files saved (range {start_idx}-{end_idx-1})")
          
          if __name__ == '__main__':
              asyncio.run(main())
          EOF

      - name: Run MHTML downloader with range
        run: |
          python save_range_mhtml.py \
            --url "${{ github.event.inputs.url }}" \
            --title "${{ github.event.inputs.title }}" \
            --start-from "${{ github.event.inputs.start_from }}" \
            --end-at "${{ github.event.inputs.end_at }}"

      - name: محاسبه نام فایل و ساخت ZIP
        id: zip
        run: |
          sudo apt-get install -y zip
          
          START="${{ github.event.inputs.start_from }}"
          END="${{ github.event.inputs.end_at }}"
          
          if [ "$END" == "0" ]; then
            RANGE="${START}+"
          else
            # چون end_at شماره نهایی است و اندیس آخر = end_at-1
            END_IDX=$((END - 1))
            RANGE="${START}-${END_IDX}"
          fi
          
          FILENAME="${{ github.event.inputs.title }}_${RANGE}.zip"
          
          zip -j -P "${{ github.event.inputs.password }}" "$FILENAME" downloader/*.mhtml
          
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "✅ Created: $FILENAME"

      - name: Commit and push ZIP to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          FILENAME="${{ steps.zip.outputs.filename }}"
          
          git add "$FILENAME"
          git commit -m "📦 $FILENAME [skip ci]" || echo "Nothing to commit"
          git push
          
          echo "✅ Committed: $FILENAME"

      - name: Cleanup
        if: always()
        run: |
          rm -rf downloader
          rm -f save_range_mhtml.py
